<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevQuest Arcade | Aprende HTML & CSS</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts para estilo Arcade y Moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="arcade-container">
        <!-- Header: Stats del Jugador -->
        <header class="game-header">
            <div class="player-info">
                <span class="avatar">🐱</span>
                <div>
                    <h1 id="player-name">Player 1</h1>
                    <div class="level-badge">NIVEL <span id="current-level-num">1</span></div>
                </div>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <span class="label">PUNTOS</span>
                    <span id="xp-points" class="value">0</span>
                </div>
            </div>
        </header>

        <main class="game-layout">
            <!-- Columna Izquierda: Teoría y Misiones -->
            <section class="mission-control">
                <div class="card mission-card">
                    <h2>Misión Actual</h2>
                    <div id="theory-text" class="theory-bubble">
                        <!-- Se carga mediante JS -->
                    </div>
                </div>
                <div class="progress-container">
                    <span>Progreso del Nivel</span>
                    <div class="progress-bar">
                        <div id="progress-fill" class="fill"></div>
                    </div>
                </div>
            </section>

            <!-- Columna Central: Editor de Código -->
            <section class="editor-container">
                <div class="card editor-card">
                    <div class="tab-header">
                        <span class="tab active">index.html</span>
                    </div>
                    <textarea id="code-editor" spellcheck="false" placeholder="Escribe tu código aquí..."></textarea>
                </div>
                <button id="run-btn" class="arcade-btn">EJECUTAR CÓDIGO ⚡</button>
            </section>

            <!-- Columna Derecha: Vista Previa -->
            <section class="preview-container">
                <div class="card preview-card">
                    <div class="screen-frame">
                        <iframe id="preview-window"></iframe>
                    </div>
                </div>
                <button id="next-lvl-btn" class="arcade-btn next-btn" disabled>SIGUIENTE NIVEL 🏆</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
